<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>VidLine - Premium Video Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Global Tasarım Ayarları */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 100%;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f0f0f;
      color: #f1f1f1;
      overflow-x: hidden;
    }

    /* Şeffaf Üst Bar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(15, 15, 15, 0.98);
      backdrop-filter: blur(10px);
      padding: 0 24px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .logo-alani {
      font-size: 20px;
      font-weight: 700;
      color: #ff0000;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.7px;
      cursor: pointer;
    }
    
    .logo-alani span {
      color: #ffffff;
      font-size: 11px;
      font-weight: 600;
      background: #272727;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }

    .search-container {
      flex-grow: 0.35;
      display: flex;
      align-items: center;
    }
    
    .search-box {
      width: 100%;
      padding: 10px 20px;
      border: 1px solid #303030;
      background-color: #121212;
      color: #ffffff;
      border-radius: 40px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .search-box:focus {
      border-color: #1c62b9;
    }

    .profil-alani {
      font-size: 13px;
      font-weight: 600;
      background: #cc0000;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* Sol Menü (Sidebar) */
    .sidebar {
      width: 240px;
      background-color: #0f0f0f;
      position: fixed;
      top: 56px;
      bottom: 0;
      left: 0;
      padding: 12px 0;
      border-right: 1px solid rgba(255, 255, 255, 0.03);
    }
    
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 10px 24px;
      color: #f1f1f1;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-radius: 10px;
      margin: 0 12px 4px 12px;
      transition: background-color 0.15s;
      cursor: pointer;
    }
    
    .sidebar-link:hover, .sidebar-link.aktif {
      background-color: rgba(255, 255, 255, 0.1);
    }

    /* Sağ İçerik */
    .ana-icerik {
      margin-left: 240px;
      flex-grow: 1;
      padding: 24px;
      margin-top: 56px;
      background-color: #0f0f0f;
    }

    /* Reklam Alanı */
    .reklam-alani {
      width: 100%;
      max-width: 728px;
      height: 90px;
      background: #161616;
      border: 1px dashed #333;
      border-radius: 8px;
      margin: 0 auto 40px auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 12px;
      font-weight: bold;
    }

    /* Boş Ekran Bildirimi */
    .bos-ekran {
      text-align: center;
      padding: 80px 20px;
      background: #161616;
      border-radius: 16px;
      max-width: 600px;
      margin: 0 auto;
      border: 1px solid #222;
    }

    .bos-ekran-ikon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .bos-ekran-baslik {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .bos-ekran-metin {
      font-size: 14px;
      color: #aaa;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .ana-icerik { margin-left: 0; padding: 12px; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo-alani">🎬 VidLine <span>PRO</span></div>
    <div class="search-container">
      <input type="text" class="search-box" placeholder="Arama yapmak için video yükleyin...">
    </div>
    <div class="profil-alani">$$ Reklam Ver</div>
  </div>

  <div class="ana-yapi">
    <div class="sidebar">
      <div class="sidebar-link aktif">🏠 Ana Sayfa</div>
      <a href="https://www.youtube.com/feed/trending" target="_blank" class="sidebar-link">🔥 Trendler</a>
      <a href="https://www.youtube.com/feed/subscriptions" target="_blank" class="sidebar-link">📁 Abonelikler</a>
      <a href="https://www.youtube.com/feed/history" target="_blank" class="sidebar-link">⏳ Geçmiş</a>
    </div>

    <div class="ana-icerik">
      
      <div class="reklam-alani">
        <span style="font-size:9px; color:#555; margin-bottom:4px;">SPONSORLU BANNER REKLAMI</span>
        AdSense / Adsterra Kazanç Kodu Alanı
      </div>

      <div class="bos-ekran">
        <div class="bos-ekran-ikon">📺</div>
        <div class="bos-ekran-baslik">Henüz Video Bulunmuyor</div>
        <div class="bos-ekran-metin">Platform altyapısı güncellenmektedir. Çok yakında yeni nesil video içerikleri yüklenecektir!</div>
      </div>

    </div>
  </div>

</body>
</html>
