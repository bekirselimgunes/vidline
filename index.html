<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>VidLine - Premium Video Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Global Reset ve Font Yapısı */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 100%;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f0f0f;
      color: #f1f1f1;
      overflow-x: hidden;
    }

    /* Üst Bar (Navbar) */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(15, 15, 15, 0.98);
      backdrop-filter: blur(10px);
      padding: 0 24px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .logo-alani {
      font-size: 20px;
      font-weight: 700;
      color: #ff0000;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.7px;
    }
    
    .logo-alani span {
      color: #ffffff;
      font-size: 11px;
      font-weight: 600;
      background: #272727;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }

    .search-container {
      flex-grow: 0.35;
      display: flex;
      align-items: center;
    }
    
    .search-box {
      width: 100%;
      padding: 10px 20px;
      border: 1px solid #303030;
      background-color: #121212;
      color: #ffffff;
      border-radius: 40px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .search-box:focus {
      border-color: #1c62b9;
    }

    .profil-alani {
      font-size: 13px;
      font-weight: 600;
      background: #272727;
      padding: 6px 12px;
      border-radius: 20px;
    }

    /* Ana Yapı Düzeni */
    .ana-yapi {
      display: flex;
      margin-top: 56px;
    }

    /* Sol Menü (Sidebar) */
    .sidebar {
      width: 240px;
      background-color: #0f0f0f;
      position: fixed;
      top: 56px;
      bottom: 0;
      left: 0;
      padding: 12px 0;
      border-right: 1px solid rgba(255, 255, 255, 0.03);
    }
    
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 10px 24px;
      color: #f1f1f1;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-radius: 10px;
      margin: 0 12px 4px 12px;
      transition: background-color 0.15s;
    }
    
    .sidebar-link:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }
    
    .sidebar-link.aktif {
      background-color: rgba(255, 255, 255, 0.12);
      font-weight: 600;
    }

    /* Sağ İçerik Alanı */
    .ana-icerik {
      margin-left: 240px;
      flex-grow: 1;
      padding: 24px;
      min-height: calc(100vh - 56px);
      background-color: #0f0f0f;
    }

    /* GELİŞMİŞ REKLAM ALANI (MONETIZATION BANNER) */
    .reklam-alani {
      width: 100%;
      max-width: 728px;
      height: 90px;
      background: #161616;
      border: 1px dashed #333;
      border-radius: 8px;
      margin: 0 auto 30px auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    
    .reklam-alani span {
      font-size: 9px;
      color: #555;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    /* Video Grid Alanı */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* Video Kartı */
    .video-card {
      background-color: transparent;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .thumbnail-alani {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: #212121;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
    }
    
    .thumbnail-alani img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sure-etiketi {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background-color: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 3px 6px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
    }

    .video-detay {
      display: flex;
      margin-top: 12px;
      gap: 12px;
    }
    
    .kanal-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
      color: #ffffff;
    }
    
    .yazi-grubu {
      display: flex;
      flex-direction: column;
      text-align: left;
    }
    
    .video-baslik {
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
      color: #f1f1f1;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .kanal-adi, .izlenme-bilgisi {
      font-size: 12px;
      color: #aaa;
    }

    /* Mobil Uyum Kodu */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .ana-icerik { margin-left: 0; padding: 12px; }
      .navbar { padding: 0 12px; }
      .search-container { flex-grow: 0.7; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo-alani">🎬 VidLine <span>PRO</span></div>
    <div class="search-container">
      <input type="text" id="aramaKutusu" class="search-box" placeholder="Platformda ara...">
    </div>
    <div class="profil-alani">Premium Öne Çıkar</div>
  </div>

  <div class="ana-yapi">
    <div class="sidebar">
      <a href="#" class="sidebar-link aktif">🏠 Ana Sayfa</a>
      <a href="#" class="sidebar-link">🔥 Trendler</a>
      <a href="#" class="sidebar-link">📁 Abonelikler</a>
      <a href="#" class="sidebar-link">⏳ Geçmiş</a>
    </div>

    <div class="ana-icerik">
      
      <div class="reklam-alani">
        <span>SPONSORLU REKLAM ALANI (728x90)</span>
        Google AdSense veya Adsterra Kodu Buraya Gelecek
      </div>
      <div class="video-grid" id="videoGrid">
        </div>
    </div>
  </div>

  <script>
    // Tamamı küresel olarak çalışan, telifsiz ve engelsiz 12 Popüler Video Verisi
    const premiumVideolar = [
      { id: "dQw4w9WgXcQ", baslik: "Rick Astley - Never Gonna Give You Up (Official Music Video)", kanal: "Rick Astley", izlenme: "1.5 Mlrd", sure: "03:32", renk: "#ff5722" },
      { id: "9bZkp7q19f0", baslik: "PSY - GANGNAM STYLE (강남스타일) M/V", kanal: "officialpsy", izlenme: "5.1 Mlrd", sure: "04:12", renk: "#2196f3" },
      { id: "jNQXAC9IVRw", baslik: "Me at the zoo - Official First Video on YouTube", kanal: "jawed", izlenme: "310 Mn", sure: "00:19", renk: "#4caf50" },
      { id: "kJQP7kiw5Fk", baslik: "Luis Fonsi - Despacito ft. Daddy Yankee", kanal: "Luis Fonsi", izlenme: "8.4 Mlrd", sure: "04:42", renk: "#9c27b0" },
      { id: "09R8_2nJtjg", baslik: "Maroon 5 - Sugar (Official Music Video)", kanal: "Maroon 5", izlenme: "4.0 Mlrd", sure: "05:01", renk: "#e91e63" },
      { id: "VbfpW0pbvaU", baslik: "Lofi Hip Hop Radio 📚 Beats to Relax/Study to", kanal: "Lofi Girl", izlenme: "750 Mn", sure: "Canlı", renk: "#ffeb3b" },
      { id: "CevxZvSJLk8", baslik: "Katy Perry - Roar (Official Music Video)", kanal: "Katy Perry", izlenme: "3.9 Mlrd", sure: "04:30", renk: "#00bcd4" },
      { id: "fRh_vgS2dFE", baslik: "Justin Bieber - Sorry (PURPOSE : The Movement)", kanal: "Justin Bieber", izlenme: "3.7 Mlrd", sure: "03:25", renk: "#607d8b" },
      { id: "YQHsXMglC9A", baslik: "Adele - Hello (Official Music Video)", kanal: "Adele", izlenme: "3.1 Mlrd", sure: "06:07", renk: "#795548" },
      { id: "JGwWNGJdvx8", baslik: "Ed Sheeran - Shape of You (Official Music Video)", kanal: "Ed Sheeran", izlenme: "6.2 Mlrd", sure: "04:24", renk: "#ffc107" }
    ];

    const grid = document.getElementById('videoGrid');

    // Platformun dopdolu durması için listeyi 2 kez döndürerek 20 video kartı basıyoruz
    for(let i=0; i<2; i++) {
      premiumVideolar.forEach(vid => {
        const kart = document.createElement('a');
        kart.href = `https://www.youtube.com/watch?v=${vid.id}`;
        kart.target = "_blank";
        kart.className = "video-card";
        
        kart.innerHTML = `
          <div class="thumbnail-alani">
            <img src="https://img.youtube.com/vi/${vid.id}/mqdefault.jpg">
            <div class="sure-etiketi">${vid.sure}</div>
          </div>
          <div class="video-detay">
            <div class="kanal-avatar" style="background: ${vid.renk}; color: #000;">${vid.kanal.substring(0,2).toUpperCase()}</div>
            <div class="yazi-grubu">
              <div class="video-baslik">${vid.baslik}</div>
              <div class="kanal-adi">${vid.kanal}</div>
              <div class="izlenme-bilgisi">${vid.izlenme} İzlenme</div>
            </div>
          </div>
        `;
        grid.appendChild(kart);
      });
    }

    // Gelişmiş Filtreleme Arama Motoru
    const aramaKutusu = document.getElementById('aramaKutusu');
    aramaKutusu.addEventListener('input', function(e) {
      const aranan = e.target.value.toLowerCase();
      const kartlar = document.querySelectorAll('.video-card');
      
      kartlar.forEach(kart => {
        const baslik = kart.querySelector('.video-baslik').textContent.toLowerCase();
        kart.style.display = baslik.includes(aranan) ? 'flex' : 'none';
      });
    });
  </script>
</body>
</html>
