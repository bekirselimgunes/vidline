<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>VidLine - Premium Video Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Global Tasarım Ayarları */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 100%;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f0f0f;
      color: #f1f1f1;
      overflow-x: hidden;
    }

    /* Şeffaf Üst Bar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(15, 15, 15, 0.98);
      backdrop-filter: blur(10px);
      padding: 0 24px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .logo-alani {
      font-size: 20px;
      font-weight: 700;
      color: #ff0000;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.7px;
    }
    
    .logo-alani span {
      color: #ffffff;
      font-size: 11px;
      font-weight: 600;
      background: #272727;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }

    .search-container {
      flex-grow: 0.35;
      display: flex;
      align-items: center;
    }
    
    .search-box {
      width: 100%;
      padding: 10px 20px;
      border: 1px solid #303030;
      background-color: #121212;
      color: #ffffff;
      border-radius: 40px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .search-box:focus {
      border-color: #1c62b9;
    }

    .profil-alani {
      font-size: 13px;
      font-weight: 600;
      background: #cc0000;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* Sol Menü (Sidebar) */
    .sidebar {
      width: 240px;
      background-color: #0f0f0f;
      position: fixed;
      top: 56px;
      bottom: 0;
      left: 0;
      padding: 12px 0;
      border-right: 1px solid rgba(255, 255, 255, 0.03);
    }
    
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 10px 24px;
      color: #f1f1f1;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-radius: 10px;
      margin: 0 12px 4px 12px;
      transition: background-color 0.15s;
    }
    
    .sidebar-link:hover, .sidebar-link.aktif {
      background-color: rgba(255, 255, 255, 0.1);
    }

    /* Sağ İçerik */
    .ana-icerik {
      margin-left: 240px;
      flex-grow: 1;
      padding: 24px;
      margin-top: 56px;
      background-color: #0f0f0f;
    }

    /* SİNEMATİK DAHİLİ VİDEO OYNATICI (PLAYER) */
    .player-container {
      width: 100%;
      max-width: 854px;
      margin: 0 auto 24px auto;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      display: none; /* İlk başta gizli, videoya basınca açılır */
    }

    .player-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Reklam Alanı */
    .reklam-alani {
      width: 100%;
      max-width: 728px;
      height: 90px;
      background: #161616;
      border: 1px dashed #333;
      border-radius: 8px;
      margin: 0 auto 24px auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 12px;
      font-weight: bold;
    }

    /* YouTube Kategori Butonları */
    .kategoriler {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .kategori-btn {
      background: #272727;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .kategori-btn:hover, .kategori-btn.aktif {
      background: #fff;
      color: #000;
    }

    /* Grid Yapısı */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .video-card {
      background-color: transparent;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .thumbnail-alani {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: #212121;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .thumbnail-alani img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sure-etiketi {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background-color: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 3px 6px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
    }

    .video-detay {
      display: flex;
      margin-top: 12px;
      gap: 12px;
    }
    
    .kanal-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
    }
    
    .yazi-grubu {
      display: flex;
      flex-direction: column;
      text-align: left;
    }
    
    .video-baslik {
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
      color: #f1f1f1;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .kanal-adi {
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Onay Rozeti (Tik İşareti) */
    .kanal-adi::after {
      content: "✓";
      background: #aaa;
      color: #0f0f0f;
      font-size: 9px;
      font-weight: bold;
      width: 12px;
      height: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    
    .izlenme-bilgisi {
      font-size: 12px;
      color: #aaa;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .ana-icerik { margin-left: 0; padding: 12px; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo-alani">🎬 VidLine <span>PRO</span></div>
    <div class="search-container">
      <input type="text" id="aramaKutusu" class="search-box" placeholder="VidLine üzerinde ara...">
    </div>
    <div class="profil-alani">$$ Reklam Ver</div>
  </div>

  <div class="ana-yapi">
    <div class="sidebar">
      <a href="#" class="sidebar-link aktif">🏠 Ana Sayfa</a>
      <a href="#" class="sidebar-link">🔥 Trendler</a>
      <a href="#" class="sidebar-link">📁 Abonelikler</a>
      <a href="#" class="sidebar-link">⏳ Geçmiş</a>
    </div>

    <div class="ana-icerik">
      
      <div class="player-container" id="playerKutusu">
        <iframe id="vidlineIframe" src="" allowfullscreen allow="autoplay"></iframe>
      </div>

      <div class="reklam-alani">
        <span style="font-size:9px; color:#555; margin-bottom:4px;">SPONSORLU BANNER REKLAMI</span>
        AdSense / Adsterra Kazanç Kodu Alanı
      </div>

      <div class="kategoriler">
        <button class="kategori-btn aktif" data-cat="all">Tümü</button>
        <button class="kategori-btn" data-cat="music">Müzik</button>
        <button class="kategori-btn" data-cat="lofi">Lofi & Relax</button>
        <button class="kategori-btn" data-cat="classic">Klasik</button>
      </div>

      <div class="video-grid" id="videoGrid"></div>
    </div>
  </div>

  <script>
    const videolar = [
      { id: "dQw4w9WgXcQ", category: "music", baslik: "Rick Astley - Never Gonna Give You Up (Official Music Video)", kanal: "Rick Astley", izlenme: "1.5 Mlrd • 3 yıl önce", sure: "03:32", renk: "#ff5722" },
      { id: "9bZkp7q19f0", category: "music", baslik: "PSY - GANGNAM STYLE (강남스타일) M/V", kanal: "officialpsy", izlenme: "5.1 Mlrd • 5 yıl önce", sure: "04:12", renk: "#2196f3" },
      { id: "VbfpW0pbvaU", category: "lofi", baslik: "Lofi Hip Hop Radio 📚 Beats to Relax/Study to", kanal: "Lofi Girl", izlenme: "750 Mn • Canlı", sure: "Canlı", renk: "#ffeb3b" },
      { id: "09R8_2nJtjg", category: "music", baslik: "Maroon 5 - Sugar (Official Music Video)", kanal: "Maroon 5", izlenme: "4.0 Mlrd • 2 yıl önce", sure: "05:01", renk: "#e91e63" },
      { id: "kJQP7kiw5Fk", category: "music", baslik: "Luis Fonsi - Despacito ft. Daddy Yankee", kanal: "Luis Fonsi", izlenme: "8.4 Mlrd • 1 yıl önce", sure: "04:42", renk: "#9c27b0" },
      { id: "jNQXAC9IVRw", category: "classic", baslik: "Me at the zoo - Official First Video on YouTube", kanal: "jawed", izlenme: "310 Mn • 15 yıl önce", sure: "00:19", renk: "#4caf50" }
    ];

    const grid = document.getElementById('videoGrid');
    const playerKutusu = document.getElementById('playerKutusu');
    const iframe = document.getElementById('vidlineIframe');

    // Videoları Ekrana Basan Fonksiyon
    function videolariListele(filtre = "all") {
      grid.innerHTML = "";
      videolar.forEach(vid => {
        if(filtre !== "all" && vid.category !== filtre) return;

        const kart = document.createElement('div');
        kart.className = "video-card";
        
        kart.innerHTML = `
          <div class="thumbnail-alani">
            <img src="https://img.youtube.com/vi/${vid.id}/mqdefault.jpg">
            <div class="sure-etiketi">${vid.sure}</div>
          </div>
          <div class="video-detay">
            <div class="kanal-avatar" style="background: ${vid.renk}; color: #000;">${vid.kanal.substring(0,2).toUpperCase()}</div>
            <div class="yazi-grubu">
              <div class="video-baslik">${vid.baslik}</div>
              <div class="kanal-adi">${vid.kanal}</div>
              <div class="izlenme-bilgisi">${vid.izlenme}</div>
            </div>
          </div>
        `;

        // Tıklama Olayı: YouTube'a YÖNLENDİRMEZ, Sitede Açar!
        kart.addEventListener('click', () => {
          iframe.src = `https://www.youtube.com/embed/${vid.id}?autoplay=1`;
          playerKutusu.style.display = "block";
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        grid.appendChild(kart);
      });
    }

    // İlk açılışta tüm videoları yükle
    videolariListele();

    // Kategori Filtreleme Tetikleyicileri
    document.querySelectorAll('.kategori-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.kategori-btn').forEach(b => b.classList.remove('aktif'));
        e.target.classList.add('aktif');
        videolariListele(e.target.getAttribute('data-cat'));
      });
    });

    // Entegre Arama Çubuğu Sistemi
    const aramaKutusu = document.getElementById('aramaKutusu');
    aramaKutusu.addEventListener('input', function(e) {
      const aranan = e.target.value.toLowerCase();
      const kartlar = document.querySelectorAll('.video-card');
      kartlar.forEach(kart => {
        const baslik = kart.querySelector('.video-baslik').textContent.toLowerCase();
        kart.style.display = baslik.includes(aranan) ? 'flex' : 'none';
      });
    });
  </script>
</body>
</html>
